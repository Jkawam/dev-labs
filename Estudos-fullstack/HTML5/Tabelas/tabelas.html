<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--
    caption: Título da tabela
    thead: Cabeçalho da tabela
    tbody: Corpo da tabela
    tfoot: Rodapé da tabela
    -->
    <table border="1">
        <caption>Listagem de Produtos</caption>

        <thead> <!-- Cabeçalho da tabela -->
            <tr>
                <th>Nome</th>
                <th>Preço</th>
                <th>Quantidade</th>
            </tr>
        </thead>

        <tbody> <!-- Corpo da tabela -->
            <tr>
                <td>Produto A</td>
                <td>R$ 10,00</td>
                <td>5</td>
            </tr>
            <tr>
                <td>Produto B</td>
                <td>R$ 20,00</td>
                <td>3</td>
            </tr>
        </tbody>

        <tfoot> <!-- Rodapé da tabela -->
            <tr>
                <td colspan="2">Total</td> <!-- colspan: voce escolhe quantas colunas horizontalmete ela deve ocupar -->
                <td>8</td>
            </tr>

    </table>
</body>
</html>
