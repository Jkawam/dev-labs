<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usando videos</title>
</head>
<body>
    <h1>Usando Videos</h1>

    <!--
    source: ele serve para indicar o endereço do video
    type: ele serve para indicar o formato do video
    controls: ele serve para indicar os controles do video
    autoplay: ele serve para indicar que o video deve ser reproduzido automaticamente]
    muted: ele serve para indicar que o video deve ser reproduzido sem som
    loop: ele serve para indicar que o video deve ser reproduzido infinitamente
    poster: ele serve para indicar o poster do video
    -->

    <video width="320px" muted controls autoplay poster="../tabelas/img/brasil.png">
        <source src="midia/video.mp4" type="video/mp4"> <!-- type serve para indicar o formato do video-->
        não foi possivel carregar o video
    </video>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/oo4diOoFIRI?si=hhhbuUCf-rUhqNbV" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    
</body>
</html>
