<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
</head>

<style>

    #Menu{
 
    width: 150px;
    }

    .escolha{
        background-color: rgb(223, 164, 87);
        padding: 5px;
    }

    .escolha a{
        text-decoration: none;
        color: black;
        display: inline-block;
        transition: 0.3s;
    }

    a:hover{
        color: white;
        transform: scale(1.1);
        
    }

    #menu ul{
        list-style: none;
        border: 1px solid black;
        padding: 0px;
        width: 200px;
        background-color: rgb(223, 164, 87);
    }

    #menu li a{
    border: 1px solid red;
    display: block;
    padding: 0.5em 1.5em;
    color: black;
    text-decoration: none;
    background: rgb(223, 164, 87);
    
    }

</style>

<body>

        </div>

<div id="menu">

</html>
