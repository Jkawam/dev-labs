<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>

    <style>

        body{
            background-color: black;
        }

        /* row, column, row-reverse*/

        .container-flex{
            width: 180px;
            border: 4px solid red;
            display: flex; /* o display flex é utilizado para colocar os elementos em linha */
            /*flex-direction: row; /* o flex-direction: row; define a direção dos elementos em linha, nesse caso ele já vem com essa propriedade */
            /*flex-direction: column;  o flex-direction: column; deifine a direção do elemento como coluna */
            /*flex-direction: reverse;  o flex-direction: reverse;  */
            flex-direction: column-reverse; /* o flex-direction define a direção dos elementos */
        }

        .container-flex > div{
            border: 4px solid white;
            color: white;
            padding: 4px;
            margin: 4px;
        } 

    </style>

</head>
<body>
    
    <h1>Display Flex</h1>

    <div class="container-flex">
        <div>01</div>
        <div>02</div>
        <div>03</div>
        <div>04</div>
        <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div>

    </div>
</body>
</html>
