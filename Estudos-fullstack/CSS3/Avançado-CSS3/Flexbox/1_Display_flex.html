<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>

    <style>

        body{
            background-color: black;
        }

        .container-flex{
            width: 180px;
            border: 4px solid red;
            display: flex; /* o display flex é utilizado para colocar os elementos em linha */
            flex-direction: row; /* o flex-direction define a direção dos elementos */
            flex-wrap: nowrap; /* o flex-wrap define se os elementos podem quebrar de linha */
            flex-flow: column wrap; /* o flex-flow define a direção e o wrap */
        }

        .container-flex > div{
            border: 4px solid white;
            color: white;
            padding: 4px;
            margin: 4px;
        }

    </style>

</head>
<body>
    
    <h1>Display Flex</h1>

    <div class="container-flex">
        <div>01</div>
        <div>02</div>
        <div>03</div>
        <div>04</div>
        <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div>
    </div>

</body>
</html>
