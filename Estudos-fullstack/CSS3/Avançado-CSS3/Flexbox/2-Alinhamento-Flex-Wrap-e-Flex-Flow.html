<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento com Flex-wrap</title>

    <style>

        body{
            background-color: rgb(202, 202, 202);
        }

        .container-flex{
            width: 180px;/* largura */
            border: 4px solid red;
            display: flex; /* o display flex é utilizado para colocar os elementos em linha */
            /*flex-direction: row; /* o flex-direction: row; define a direção dos elementos em linha, nesse caso ele já vem com essa propriedade */
            /*wrap, nowrap, wrap-reverse*/
            /*flex-wrap: nowrap; /* o flex-wrap: nowrap; define que os elementos nao sejam quebrados, é o padrão do css */
            /*flex-wrap: wrap; /* o flex-wrap: wrap; define que os elementos sejam quebrados */
            /*flex-wrap: wrap-reverse; /* o flex-wrap:define que os elementos sejam quebrados e sejam invertidos */
            flex-flow: row wrap ; /*flex-flow: define o flex-direction e o flex-wrap em uma linha de código*/
            
        }

        .container-flex > div{
            border: 4px solid rgb(32, 32, 32);
            color: rgb(26, 25, 25);
            padding: 4px;
            margin: 4px;
        }

    </style>

</head>
<body>
    
    <h1>Flex-wrap e (Flex-flow)</h1>

    <div class="container-flex">
        <div>01</div>
        <div>02</div>
        <div>03</div>
        <div>04</div>
        <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div>
    </div>

</body>
</html>
