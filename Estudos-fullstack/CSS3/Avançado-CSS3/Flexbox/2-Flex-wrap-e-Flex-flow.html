<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex-wrap</title>

    <style>

        body{
            background-color: black;
        }

        .container-flex{
            width: 180px;/* largura */
            border: 4px solid red;
            display: flex; /* o display flex é utilizado para colocar os elementos em linha */
            /*flex-direction: row; /* o flex-direction: row; define a direção dos elementos em linha */
            /*wrap, nowrap, wrap-reverse*/
            /*flex-wrap: wrap; /* o flex-wrap: wrap; define que os elementos sejam quebrados */
            /*flex-wrap: wrap-reverse; /* o flex-wrap: wrap-reverse; define que os elementos sejam quebrados e sejam invertidos */
            flex-flow: column wrap-reverse; /*flex-flow: column wrap-reverse; define que os elementos sejam quebrados e sejam invertidos */
            
        }

        .container-flex > div{
            border: 4px solid white;
            color: white;
            padding: 4px;
            margin: 4px;
            background-color: black;
        }

    </style>

</head>
<body>
    
    <h1>Display Flex</h1>

    <div class="container-flex">
        <div>01</div>
        <div>02</div>
        <div>03</div>
        <div>04</div>
        <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div>
    </div>

</body>
</html>
