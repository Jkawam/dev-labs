<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamentos com Align-items</title>

    <style>

        body{
            background-color: rgb(202, 202, 202);
        }

        .container-flex{
            height: 180px;
            border: 4px solid red;
            display: flex; /* o display flex é utilizado para colocar os elementos em linha */
            flex-flow: column; /* o flex-direction: row; define a direção dos elementos em linha, nesse caso ele já vem com essa propriedade
            e column define que os elementos sejam alinhados verticalmente */
            justify-content: flex-start; /* alinha os elementos de acordo com a caixa*/
            align-items: flex-start; /* o align-content faz com que os elementos sejam alinhados da forma que desejar em cima, só funciona com o flex-wrap*/

        }

        .container-flex > div{
            border: 4px solid rgb(32, 32, 32);
            color: rgb(26, 25, 25);
            padding: 4px;
            margin: 4px;
            font-weight:bold;
        }

        .maior1{
            font-size: 3rem;
            
        }

    </style>

</head>
<body> 

    <div class="container-flex">
        <div>01</div>
        <div class="maior1">02</div>
        <div>03</div>
    </div>

</body>
</html>
