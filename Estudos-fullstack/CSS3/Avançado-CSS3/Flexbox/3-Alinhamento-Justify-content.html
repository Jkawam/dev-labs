<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamentos</title>

    <style>

        body{
            background-color: rgb(202, 202, 202);
        }

        /* flex-start, flex-end, center, space-between, space-around, space-evenly*/

        /* flex-start ele alinha os elementos ao topo do container*/

        /* flex-end ele alinha os elementos ao final do container*/

        /* center ele alinha os elementos ao centro do container*/

        /* space-between ele alinha os elementos com um espaço entre eles*/

        /* space-around ele alinha os elementos com um espaço ao redor deles*/

        /* space-evenly ele alinha os elementos com um espaço entre eles e ao redor deles*/

        .container-flex{
            height: 400px;/* altura */
            border: 4px solid red;
            display: flex; /* o display flex é utilizado para colocar os elementos em linha */
            flex-direction: column; /* o flex-direction: row; define a direção dos elementos em linha, nesse caso ele já vem com essa propriedade
            e column define que os elementos sejam alinhados verticalmente */
            justify-content: space-evenly; /* alinha os elementos horizontalmente */
        }

        .container-flex > div{
            border: 4px solid rgb(32, 32, 32);
            color: rgb(26, 25, 25);
            padding: 4px;
            margin: 4px;
        }

    </style>

</head>
<body>
    
    <h1>Alinhamentos</h1>

    <div class="container-flex">
        <div>01</div>
        <div>02</div>
        <div>03</div>
        <div>04</div>
   <!-- <div>05</div>
        <div>06</div>
        <div>07</div>
        <div>08</div>
        <div>09</div>
        <div>10</div> -->
    </div>

</body>
</html>
