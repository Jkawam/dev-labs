<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>estilos de bordas</title>

    <style>
        h1{
            background-color: rgb(255, 166, 0);
            border-bottom: dotted 2px rgb(0, 0, 0); /*criando uma borda*/
            border-top-left-radius: 10px; /*arredonda as bordas da parte de cima e do lado esquerdo*/
            border-top-right-radius: 10px;
        }

        p{
            background-color: rgb(96, 172, 223);
            border-radius:20px;
            border-left: solid 10px rgb(15, 66, 124);
            border-right: solid 10px rgb(15, 66, 124);
            padding: 10px;
        }
   
    </style>

</head>
<body>

    <!--os 3 valores de borda são: width, style, color-->
    <!--o width ele é usado para definir o tamanho da borda-->
    <!--o style ele é usado para definir o estilo da borda-->
    <!--o color ele é usado para definir a cor da borda-->

    <!-- A melhor forma de usar é todos juntos ex: border: solid 2px rgb(255, 0, 0);-->

    <h1>usando a borda</h1>
    <p>Lorem ipsum dolor sit amet consectetur <br>
     adipisicing elit. Optio, ex. Consequatur cupiditate ad possimus ea! Tenetur recusandae <br>
     quaerat possimus reiciendis pariatur nobis doloremque, accusantium dignissimos, fuga reprehenderit natus corrupti 
     ratione.</p>
</body>
</html>
